<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Добро пожаловать</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css"
          integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
          crossorigin="anonymous">
    <style>
        body {
            background-color: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .jumbotron {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
        .btn-primary {
            background-color: #f55 !important;
            border-color: #f55 !important;
        }
        .btn-primary:hover {
            background-color: #f00 !important;
            border-color: #f00 !important;
        }
        .btn-secondary {
            background-color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="jumbotron">
            <h1 class="display-4">Добро пожаловать на сайт хороших новостей!</h1>
            <p class="lead">Выберите раздел:</p>
            <hr class="my-4">
            <a class="btn btn-primary btn-lg" href="{% url 'home' %}" style="background-color: #f55; border-color: #f55;">Приложение новостей</a>
            <a class="btn btn-secondary btn-lg" href="/admin/">Админка</a>
        </div>
    </div>
</body>
</html>
