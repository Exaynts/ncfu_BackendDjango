{% extends 'base.html' %}

{% block title %}Вход | {{ block.super }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                Вход в личный кабинет
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary btn-block" style="background-color: #f55;">Войти</button>
                </form>
                <div class="mt-3 text-center">
                    Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
